services:
  analytics-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ANALYTICS_POSTGRES_DB:-analytics}
      POSTGRES_USER: ${ANALYTICS_POSTGRES_USER:-analytics}
      POSTGRES_PASSWORD: ${ANALYTICS_POSTGRES_PASSWORD:-analytics}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ANALYTICS_POSTGRES_USER:-analytics} -d ${ANALYTICS_POSTGRES_DB:-analytics}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${ANALYTICS_POSTGRES_PORT:-55432}:5432"
    volumes:
      - analytics_pgdata:/var/lib/postgresql/data

  analytics-backend:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      analytics-db:
        condition: service_healthy
      phoenix:
        condition: service_started
    command:
      - uvicorn
      - litellm_proxy_headroom.analytics.adapters.api.app:create_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8010"
    environment:
      ANALYTICS_DATABASE_URL: postgresql+asyncpg://${ANALYTICS_POSTGRES_USER:-analytics}:${ANALYTICS_POSTGRES_PASSWORD:-analytics}@analytics-db:5432/${ANALYTICS_POSTGRES_DB:-analytics}
      OTEL_SERVICE_NAME: litellm-analytics-backend
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://phoenix:6006/v1/traces
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-litellm-proxy-headroom}
      ANALYTICS_CACHED_INPUT_COST_MULTIPLIER: ${ANALYTICS_CACHED_INPUT_COST_MULTIPLIER:-0.10}
      HEADROOM_ANALYTICS_OTEL_ENABLED: "true"
      HEADROOM_ANALYTICS_OTEL_CONSOLE: ${HEADROOM_ANALYTICS_OTEL_CONSOLE:-false}
      HEADROOM_ANALYTICS_OTEL_METRIC_EXPORT_INTERVAL_MS: ${HEADROOM_ANALYTICS_OTEL_METRIC_EXPORT_INTERVAL_MS:-60000}
    ports:
      - "127.0.0.1:${ANALYTICS_BACKEND_PORT:-8010}:8010"

  phoenix-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: phoenix
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: ${PHOENIX_DB_PASSWORD:?set PHOENIX_DB_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix -d phoenix"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - phoenix_pgdata:/var/lib/postgresql/data

  phoenix:
    image: arizephoenix/phoenix:latest
    restart: unless-stopped
    depends_on:
      phoenix-db:
        condition: service_healthy
    environment:
      PHOENIX_POSTGRES_HOST: phoenix-db
      PHOENIX_POSTGRES_PORT: "5432"
      PHOENIX_POSTGRES_USER: phoenix
      PHOENIX_POSTGRES_PASSWORD: ${PHOENIX_DB_PASSWORD:?set PHOENIX_DB_PASSWORD in .env}
      PHOENIX_POSTGRES_DB: phoenix
      PHOENIX_DEFAULT_RETENTION_POLICY_DAYS: ${PHOENIX_DEFAULT_RETENTION_POLICY_DAYS:-90}
      PHOENIX_TELEMETRY_ENABLED: "false"
    ports:
      - "127.0.0.1:6006:6006"
    expose:
      - "4317"
      - "6006"

  litellm:
    build:
      context: .
    restart: unless-stopped
    command:
      - litellm
      - --config
      - /app/config/litellm.yaml
      - --host
      - 0.0.0.0
      - --port
      - "4000"
    depends_on:
      analytics-backend:
        condition: service_started
      phoenix:
        condition: service_started
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY in .env}
      CONFIG_FILE_PATH: /app/config/litellm.yaml
      CHATGPT_TOKEN_DIR: /data/chatgpt
      CHATGPT_AUTH_FILE: ${CHATGPT_AUTH_FILE:-auth.json}
      LITELLM_OTEL_V2: "true"
      OTEL_SERVICE_NAME: litellm-proxy
      OTEL_EXPORTER: otlp_http
      OTEL_ENDPOINT: http://phoenix:6006/v1/traces
      PHOENIX_COLLECTOR_HTTP_ENDPOINT: http://phoenix:6006/v1/traces
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006/v1/traces
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-litellm-proxy-headroom}
      OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT: no_content
      HEADROOM_ANALYTICS_URL: http://analytics-backend:8010
      HEADROOM_ANALYTICS_TIMEOUT_SECONDS: "0.75"
      HEADROOM_ANALYTICS_BUFFER_SIZE: "1000"
      HEADROOM_ANALYTICS_BUFFER_WORKERS: "2"
      HEADROOM_ANALYTICS_MAX_ATTEMPTS: "3"
      HEADROOM_ANALYTICS_RETRY_BASE_SECONDS: "0.1"
      HEADROOM_ANALYTICS_RETRY_MAX_SECONDS: "1.0"
      HEADROOM_ANALYTICS_SHUTDOWN_TIMEOUT_SECONDS: "2.0"
      HEADROOM_CCR_BACKEND: analytics-postgres
      HEADROOM_CCR_ANALYTICS_TIMEOUT_SECONDS: "0.75"
    expose:
      - "4000"
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./config:/app/config:ro
      - ./data/chatgpt:/data/chatgpt

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_started
      phoenix:
        condition: service_started
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?set WEBUI_SECRET_KEY in .env}
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL:-admin@example.local}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD:?set WEBUI_ADMIN_PASSWORD in .env}
      WEBUI_ADMIN_NAME: ${WEBUI_ADMIN_NAME:-Admin}
      ENABLE_SIGNUP: "false"
      DEFAULT_USER_ROLE: pending
      SAFE_MODE: "true"
      LOG_FORMAT: json
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY in .env}
      ENABLE_FORWARD_USER_INFO_HEADERS: "true"
      ENABLE_OTEL: "true"
      ENABLE_OTEL_TRACES: "true"
      ENABLE_OTEL_METRICS: "false"
      ENABLE_OTEL_LOGS: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://phoenix:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: open-webui
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - openwebui_data:/app/backend/data

volumes:
  analytics_pgdata:
  phoenix_pgdata:
  openwebui_data:
