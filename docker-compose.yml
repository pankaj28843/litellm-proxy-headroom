x-app-image: &app-image litellm-proxy-headroom-app:latest
x-app-build: &app-build
  context: .
  dockerfile: Dockerfile

services:
  analytics-db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ANALYTICS_POSTGRES_DB:-analytics}
      POSTGRES_USER: ${ANALYTICS_POSTGRES_USER:-analytics}
      POSTGRES_PASSWORD: ${ANALYTICS_POSTGRES_PASSWORD:-analytics}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ANALYTICS_POSTGRES_USER:-analytics} -d ${ANALYTICS_POSTGRES_DB:-analytics}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${ANALYTICS_POSTGRES_PORT:-55432}:5432"
    volumes:
      - analytics_pgdata:/var/lib/postgresql

  analytics-backend:
    image: *app-image
    build: *app-build
    restart: unless-stopped
    depends_on:
      analytics-db:
        condition: service_healthy
      phoenix:
        condition: service_healthy
    command:
      - uvicorn
      - litellm_proxy_headroom.analytics.adapters.api.app:create_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8010"
    environment:
      ANALYTICS_DATABASE_URL: postgresql+asyncpg://${ANALYTICS_POSTGRES_USER:-analytics}:${ANALYTICS_POSTGRES_PASSWORD:-analytics}@analytics-db:5432/${ANALYTICS_POSTGRES_DB:-analytics}
      OTEL_SERVICE_NAME: litellm-analytics-backend
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://phoenix:6006/v1/traces
      OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT: "512"
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-litellm-proxy-headroom}
      ANALYTICS_CACHED_INPUT_COST_MULTIPLIER: ${ANALYTICS_CACHED_INPUT_COST_MULTIPLIER:-0.10}
      HEADROOM_ANALYTICS_OTEL_ENABLED: "true"
      HEADROOM_ANALYTICS_OTEL_CONSOLE: ${HEADROOM_ANALYTICS_OTEL_CONSOLE:-false}
      HEADROOM_ANALYTICS_OTEL_METRIC_EXPORT_INTERVAL_MS: ${HEADROOM_ANALYTICS_OTEL_METRIC_EXPORT_INTERVAL_MS:-60000}
      LITELLM_PROXY_ANALYTICS_OTEL_EXCLUDED_URLS: ${LITELLM_PROXY_ANALYTICS_OTEL_EXCLUDED_URLS-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "exec(\"import sys, urllib.request\\nok = False\\ntry:\\n    urllib.request.urlopen('http://127.0.0.1:8010/ready', timeout=2).read()\\n    ok = True\\nexcept Exception:\\n    pass\\nsys.exit(0 if ok else 1)\")",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "${ANALYTICS_BACKEND_BIND_HOST:-10.20.30.1}:${ANALYTICS_BACKEND_PORT:-28010}:8010"

  analytics-migrations:
    image: *app-image
    build: *app-build
    profiles:
      - migrate
    restart: "no"
    depends_on:
      analytics-db:
        condition: service_healthy
    command:
      - alembic
      - upgrade
      - head
    environment:
      ANALYTICS_DATABASE_URL: postgresql+asyncpg://${ANALYTICS_POSTGRES_USER:-analytics}:${ANALYTICS_POSTGRES_PASSWORD:-analytics}@analytics-db:5432/${ANALYTICS_POSTGRES_DB:-analytics}

  phoenix-db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: phoenix
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: ${PHOENIX_DB_PASSWORD:?set PHOENIX_DB_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix -d phoenix"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - phoenix_pgdata:/var/lib/postgresql

  phoenix:
    image: arizephoenix/phoenix:version-17.15.0
    restart: unless-stopped
    depends_on:
      phoenix-db:
        condition: service_healthy
    environment:
      PHOENIX_HOST: 0.0.0.0
      PHOENIX_PORT: "6006"
      PHOENIX_GRPC_PORT: "4317"
      PHOENIX_SQL_DATABASE_URL: postgresql://phoenix:${PHOENIX_DB_PASSWORD:?set PHOENIX_DB_PASSWORD in .env}@phoenix-db:5432/phoenix
      PHOENIX_DEFAULT_RETENTION_POLICY_DAYS: ${PHOENIX_DEFAULT_RETENTION_POLICY_DAYS:-90}
      PHOENIX_TELEMETRY_ENABLED: "false"
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/python3.13",
          "-c",
          "exec(\"import sys, urllib.request\\nok = False\\ntry:\\n    urllib.request.urlopen('http://127.0.0.1:6006/', timeout=2).read(1)\\n    ok = True\\nexcept Exception:\\n    pass\\nsys.exit(0 if ok else 1)\")",
        ]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 10s
    ports:
      - "127.0.0.1:${PHOENIX_HOST_PORT:-26006}:6006"
    expose:
      - "4317"
      - "6006"

  litellm:
    image: *app-image
    build: *app-build
    restart: unless-stopped
    command:
      - uvicorn
      - litellm_proxy_headroom.litellm_app:app
      - --host
      - 0.0.0.0
      - --port
      - "4000"
    depends_on:
      analytics-backend:
        condition: service_healthy
      phoenix:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY in .env}
      CONFIG_FILE_PATH: /app/config/litellm.yaml
      CHATGPT_TOKEN_DIR: /data/chatgpt
      CHATGPT_AUTH_FILE: ${CHATGPT_AUTH_FILE:-auth.json}
      CHATGPT_DEFAULT_INSTRUCTIONS: ${CHATGPT_DEFAULT_INSTRUCTIONS:- }
      LITELLM_OTEL_V2: "true"
      OTEL_SERVICE_NAME: litellm-proxy
      OTEL_EXPORTER: otlp_http
      OTEL_ENDPOINT: http://phoenix:6006/v1/traces
      OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT: "512"
      PHOENIX_COLLECTOR_HTTP_ENDPOINT: http://phoenix:6006/v1/traces
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006/v1/traces
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-litellm-proxy-headroom}
      OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT: no_content
      HEADROOM_ANALYTICS_URL: http://analytics-backend:8010
      HEADROOM_ANALYTICS_TIMEOUT_SECONDS: "0.75"
      HEADROOM_ANALYTICS_BUFFER_SIZE: "1000"
      HEADROOM_ANALYTICS_BUFFER_WORKERS: "2"
      HEADROOM_ANALYTICS_MAX_ATTEMPTS: "3"
      HEADROOM_ANALYTICS_RETRY_BASE_SECONDS: "0.1"
      HEADROOM_ANALYTICS_RETRY_MAX_SECONDS: "1.0"
      HEADROOM_ANALYTICS_SHUTDOWN_TIMEOUT_SECONDS: "2.0"
      HEADROOM_CCR_BACKEND: analytics-postgres
      HEADROOM_CCR_ANALYTICS_TIMEOUT_SECONDS: "0.75"
      HEADROOM_SAVINGS_PROFILE: ${HEADROOM_SAVINGS_PROFILE:-agent-90}
      HEADROOM_RESPONSES_MUTABLE_OUTPUT_COMPRESSION: ${HEADROOM_RESPONSES_MUTABLE_OUTPUT_COMPRESSION:-false}
      LITELLM_PROXY_DEBUG_PAYLOAD_SHAPES: ${LITELLM_PROXY_DEBUG_PAYLOAD_SHAPES:-false}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "exec(\"import os, sys, urllib.request\\nok = False\\ntry:\\n    req = urllib.request.Request('http://127.0.0.1:4000/v1/models', headers={'Authorization': 'Bearer ' + os.environ['LITELLM_MASTER_KEY']})\\n    urllib.request.urlopen(req, timeout=2).read(1)\\n    ok = True\\nexcept Exception:\\n    pass\\nsys.exit(0 if ok else 1)\")",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    expose:
      - "4000"
    ports:
      - "${LITELLM_VM_BIND_HOST:-10.20.30.1}:${LITELLM_PROXY_PORT:-24040}:4000"
    volumes:
      - ./config:/app/config:ro
      - ./data/chatgpt:/data/chatgpt

volumes:
  analytics_pgdata:
  phoenix_pgdata:
